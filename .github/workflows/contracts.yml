name: Stellar Contracts CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "stellar-contracts/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "stellar-contracts/**"

jobs:
  contract-lint:
    name: Contract Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: |
          cd stellar-contracts
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run fmt
        run: |
          cd stellar-contracts
          cargo fmt --check

  contract-test:
    name: Contract Testing
    runs-on: ubuntu-latest
    needs: contract-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd stellar-contracts
          cargo install stellar-cli
          cargo install stellar-sdk

      - name: Run unit tests
        run: |
          cd stellar-contracts
          cargo test

      - name: Run integration tests
        run: |
          cd stellar-contracts
          cargo test --test comprehensive_tests

      - name: Run contract tests
        run: |
          cd stellar-contracts
          npm test

  contract-build:
    name: Contract Build
    runs-on: ubuntu-latest
    needs: contract-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build contracts
        run: |
          cd stellar-contracts
          cargo build --release

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stellar-contracts
          path: stellar-contracts/target/release/

  contract-deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    needs: contract-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://horizon.stellar.org

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: stellar-contracts
          path: stellar-contracts/target/release/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install stellar-cli
        run: cargo install stellar-cli

      - name: Deploy to Testnet
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          STELLAR_NETWORK_PASSPHRASE: ${{ secrets.STELLAR_NETWORK_PASSPHRASE }}
        run: |
          cd stellar-contracts
          # Add deployment logic here
          echo "Contract deployment would happen here"
          # Example: stellar contract deploy --wasm target/release/certificate_revocation.wasm

      - name: Verify deployment
        env:
          STELLAR_NETWORK_PASSPHRASE: ${{ secrets.STELLAR_NETWORK_PASSPHRASE }}
        run: |
          # Add verification logic here
          echo "Contract verification would happen here"

  security-scan:
    name: Contract Security Scan
    runs-on: ubuntu-latest
    needs: contract-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: |
          cd stellar-contracts
          cargo audit

      - name: Run cargo-deny
        run: |
          cd stellar-contracts
          cargo install cargo-deny
          cargo deny check
