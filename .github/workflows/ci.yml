name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check (${{ matrix.component }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [frontend, backend]

    defaults:
      run:
        working-directory: ${{ matrix.component }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

  build:
    name: Build Components
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    strategy:
      matrix:
        component: [frontend, backend, contracts]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        if: matrix.component == 'contracts'

      - name: Install dependencies
        run: |
          if [ "${{ matrix.component }}" == "frontend" ] || [ "${{ matrix.component }}" == "backend" ]; then
            cd ${{ matrix.component }}
            npm ci --include=dev
          fi

      - name: Build frontend
        run: |
          if [ "${{ matrix.component }}" == "frontend" ]; then
            cd frontend
            npm run build
          fi

      - name: Build backend
        run: |
          if [ "${{ matrix.component }}" == "backend" ]; then
            cd backend
            npm run build
          fi

      - name: Build contracts
        run: |
          if [ "${{ matrix.component }}" == "contracts" ]; then
            cd stellar-contracts
            cargo build
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: matrix.component == 'frontend' || matrix.component == 'backend'
        with:
          name: ${{ matrix.component }}-build
          path: ${{ matrix.component }}/dist

